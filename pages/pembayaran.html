<!doctype html>

<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pembayaran - ZENIS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../assets/css/pembayaran.css" />
  </head>

  <body>
    <!-- NAVBAR -->

    <nav class="navbar">
      <div class="logo">ZEN<span>IS</span></div>
    </nav>

    <!-- CONTENT -->

    <div class="container">
      <div class="page-header">
        <h1>Pembayaran</h1>

        <p>
          Periksa kembali layanan yang akan Anda pesan sebelum melanjutkan
          pembayaran.
        </p>
      </div>

      <div class="payment-layout">
        <!-- KIRI -->

        <div class="payment-left">
          <!-- PRODUK -->

          <div class="card">
            <h2>Layanan Dipilih</h2>

            <div id="payment-items"></div>
          </div>

          <!-- METODE -->

          <div class="card">
            <h2>Metode Pembayaran</h2>

            <div class="payment-methods">
              <label class="method-card">
                <input
                  type="radio"
                  name="payment"
                  value="qris"
                />
                <span>QRIS</span>
              </label>

              <label class="method-card">
                <input
                  type="radio"
                  name="payment"
                  value="bca"
                />
                <span>Transfer BCA</span>
              </label>

              <label class="method-card">
                <input
                  type="radio"
                  name="payment"
                  value="bri"
                />
                <span>Transfer BRI</span>
              </label>

              <label class="method-card">
                <input
                  type="radio"
                  name="payment"
                  value="ewallet"
                />
                <span>E-Wallet</span>
              </label>
            </div>

            
          </div>
        </div>

        <!-- KANAN -->

        <aside class="summary-box">
          <h2>Ringkasan Pesanan</h2>

          <div class="summary-item">
            <span>Subtotal</span>

            <span id="subtotal"> Rp0 </span>
          </div>

          <div class="summary-item">
            <span>Biaya Layanan</span>

            <span id="biaya-layanan"> Rp0 </span>
          </div>

          <hr />

          <div class="summary-total">
            <span>Total Pembayaran</span>

            <strong id="payment-total"> Rp0 </strong>
          </div>

          <button class="pay-btn" onclick="selesaikanPembayaran()">
            Buat Pesanan
          </button>

          <button class="back-btn" onclick="kembaliKeKeranjang()">
            Kembali ke Keranjang
          </button>
        </aside>
      </div>
    </div>

    <script src="../assets/js/pembayaran.js"></script>
  </body>
</html>
