<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keranjang — ZENIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../assets/css/keranjang.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">ZEN<span>IS</span></div>
      <div class="nav-menu">
        <a href="dashboard_user.html">Beranda</a>
        <a href="artikel.html">Artikel</a>
        <a href="history.html">Riwayat</a>
      </div>
      <div class="nav-right">
        <a href="keranjang.html" class="icon-btn active"><i class="bi bi-bag"></i></a>
        <span class="user-label">User</span>
        <a href="login.html" class="logout-btn">Keluar</a>
      </div>
    </nav>

    <div class="container">
      <div class="page-header">
        <h1>Keranjang Belanja</h1>
        <p class="page-subtitle">Kelola layanan wellness pilihan Anda</p>
      </div>

      <div class="cart-layout">
        <div class="cart-section">
          <div class="cart-head">
            <span class="cart-head-label">Produk Layanan</span>
            <span class="cart-head-price">Harga</span>
          </div>
          <div id="keranjang-list"></div>
        </div>

        <aside class="summary-box">
          <div class="summary-box-header">
            <i class="bi bi-receipt"></i>
            <h3>Ringkasan Pesanan</h3>
          </div>

          <div class="summary-rows">
            <div class="summary-item">
              <span class="summary-label">Subtotal</span>
              <span class="summary-value" id="subtotal">Rp0</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">Biaya Layanan</span>
              <span class="summary-value" id="biaya-layanan">Rp0</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-total">
              <span class="total-label">Total Pembayaran</span>
              <strong class="total-value" id="total-harga">Rp0</strong>
            </div>
          </div>

          <button class="checkout-btn" onclick="checkout()">
            <i class="bi bi-wallet2"></i> Lanjut Pembayaran
          </button>

          <div class="checkout-trust">
            <i class="bi bi-shield-check"></i>
            <span>Pembayaran aman & terenkripsi</span>
          </div>
        </aside>
      </div>
    </div>

    <footer>
      <div class="footer-inner">
        <div class="footer-logo">ZEN<span>IS</span></div>
        <p>&copy; 2026 ZENIS Wellness Marketplace. Semua hak dilindungi.</p>
      </div>
    </footer>

    <script src="../assets/js/keranjang.js"></script>
  </body>
</html>
