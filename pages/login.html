<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk — ZENIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="../index.html" class="logo">ZEN<span>IS</span></a>
      <div class="nav-menu">
        <a href="../index.html#services">Layanan</a>
        <a href="../index.html#testimonial">Testimonial</a>
        <a href="../index.html#artikel">Artikel</a>
      </div>
      <div class="nav-right">
        <a href="dashboard_user.html" class="btn-outline">Katalog</a>
      </div>
    </nav>

    <main class="login-page">
      <div class="login-card">
        <div class="login-header">
          <div class="login-icon">
            <i class="bi bi-person-circle"></i>
          </div>
          <h1>Masuk</h1>
          <p class="login-subtitle">Masuk ke akun untuk melanjutkan booking layanan wellness.</p>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <i class="bi bi-envelope"></i>
              <input type="email" id="email" placeholder="Masukkan email" required />
            </div>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <i class="bi bi-lock"></i>
              <input type="password" id="password" placeholder="Masukkan password" required />
            </div>
          </div>

          <div class="login-options">
            <a href="#" class="forgot-link">Lupa Password?</a>
          </div>

          <button type="submit" class="login-btn">
            <i class="bi bi-box-arrow-in-right"></i> Masuk
          </button>
        </form>

        <div class="demo-box">
          <div class="demo-box-header">
            <i class="bi bi-info-circle"></i>
            <span>Akun Demo</span>
          </div>
          <div class="demo-row">
            <span>Email</span>
            <strong>user@mail.com</strong>
          </div>
          <div class="demo-row">
            <span>Password</span>
            <strong>12345</strong>
          </div>
        </div>

        <a href="../index.html" class="back-link">
          <i class="bi bi-arrow-left"></i> Kembali ke Beranda
        </a>
      </div>
    </main>

    <script src="../assets/js/login.js"></script>
  </body>
</html>
