<!doctype html>

<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Masuk | ZENIS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>

  <body>
    <header class="navbar">
      <a href="../index.html" class="logo"> ZEN<span>IS</span> </a>
    </header>

    <main class="login-page">
      <div class="login-box">
        <h1>Masuk</h1>

        <p class="subtitle">
          Masuk ke akun untuk melanjutkan booking layanan wellness.
        </p>

        <form id="loginForm">
          <div class="input-group">
            <label>Email</label>

            <input
              type="email"
              id="email"
              placeholder="Masukkan email"
              required
            />
          </div>

          <div class="input-group">
            <label>Password</label>

            <input
              type="password"
              id="password"
              placeholder="Masukkan password"
              required
            />
          </div>

          <div class="login-option">
            <a href="#"> Lupa Password? </a>
          </div>

          <button type="submit" class="login-btn">Masuk</button>
        </form>

        <div class="demo-box">
          <h3>Akun Demo</h3>

          <div class="demo-row">
            <span>User</span>

            <strong> user@mail.com </strong>
          </div>

          <div class="demo-row">
            <span>Password</span>

            <strong> 12345 </strong>
          </div>

          <hr />


        <a href="../index.html" class="back-home"> Kembali ke Beranda </a>
      </div>
    </main>

    <script src="../assets/js/login.js"></script>
  </body>
</html>
